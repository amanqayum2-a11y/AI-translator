<script>
        let recognition;
        let isListening = false;
        let silenceTimer; // Timer to detect pauses in speech
        let accumulatedText = ""; // Holds text during a single spoken phrase
        
        const startBtn = document.getElementById('start-btn');
        const statusBadge = document.getElementById('status');
        const urduOutput = document.getElementById('urdu-output');
        const englishOutput = document.getElementById('english-output');

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            
            recognition.continuous = true; 
            recognition.interimResults = true; 
            recognition.lang = 'ur-PK'; 

            recognition.onstart = () => {
                isListening = true;
                startBtn.innerText = "Stop Listening";
                startBtn.style.backgroundColor = "#ef4444";
                statusBadge.innerText = "● LIVE TRANSLATION ACTIVE";
                statusBadge.classList.add('active');
            };

            recognition.onend = () => {
                if (isListening) {
                    recognition.start(); // Auto-restart loop
                } else {
                    resetUI();
                }
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                // Clear any pending translation timers because the Imam is actively speaking
                clearTimeout(silenceTimer);

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + ' ';
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                // Update the Urdu box immediately with live results
                if (finalTranscript || interimTranscript) {
                    urduOutput.innerHTML = `<span style="color: #ffffff;">${finalTranscript}</span> <span style="color: #9ca3af;">${interimTranscript}</span>`;
                    autoScroll(urduOutput);
                }

                // If a final segment is declared by the browser, capture it
                if (finalTranscript.trim().length > 0) {
                    accumulatedText += finalTranscript + " ";
                }

                // TRUE REAL-TIME TRIGGER: If the Imam pauses speaking for 1.5 seconds, 
                // instantly translate whatever has been spoken so far.
                silenceTimer = setTimeout(() => {
                    let textToTranslate = accumulatedText.trim() || interimTranscript.trim();
                    if (textToTranslate.length > 0) {
                        translateText(textToTranslate);
                        accumulatedText = ""; // Clear buffer for next sentence
                    }
                }, 1500); // 1500 milliseconds = 1.5 seconds of silence
            };

            recognition.onerror = (event) => {
                console.error("Speech Recognition Error: ", event.error);
                if (event.error === 'not-allowed') {
                    alert("Please allow microphone access.");
                    isListening = false;
                    resetUI();
                }
            };

        } else {
            alert("Your browser does not support Speech Recognition. Please use Google Chrome.");
        }

        function toggleListening() {
            if (!isListening) {
                recognition.start();
            } else {
                isListening = false;
                recognition.stop();
                clearTimeout(silenceTimer);
                resetUI();
            }
        }

        function resetUI() {
            startBtn.innerText = "Start Listening";
            startBtn.style.backgroundColor = "#10b981";
            statusBadge.innerText = "● Offline";
            statusBadge.classList.remove('active');
        }

        async function translateText(text) {
            try {
                const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=ur|en`);
                const data = await response.json();
                
                if (data.responseData && data.responseData.translatedText) {
                    let translatedChunk = data.responseData.translatedText;
                    
                    if (englishOutput.innerText.includes("Translation will appear here")) {
                        englishOutput.innerText = "";
                    }

                    // Append the live translation chunk seamlessly
                    englishOutput.innerText += translatedChunk + " \n\n";
                    autoScroll(englishOutput);
                }
            } catch (error) {
                console.error("Translation Error: ", error);
            }
        }

        function clearText() {
            urduOutput.innerText = "Imam's speech will show here...";
            englishOutput.innerText = "Translation will appear here in real-time...";
            accumulatedText = "";
        }

        function autoScroll(element) {
            element.scrollTop = element.scrollHeight;
        }
    </script>
