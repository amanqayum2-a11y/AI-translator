<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosque Real-Time Speech Translator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: #111827;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #10b981;
        }

        h1 {
            font-size: 2.5rem;
            color: #10b981;
            font-weight: 600;
        }

        .status-badge {
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #ef4444;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge.active {
            background-color: #10b981;
            animation: pulse 2s infinite;
        }

        .container {
            display: flex;
            flex: 1;
            padding: 30px;
            gap: 30px;
            height: calc(100vh - 100px);
        }

        .translation-box {
            flex: 2;
            background-color: #1f2937;
            border-radius: 15px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .box-title {
            font-size: 1.5rem;
            color: #9ca3af;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #english-output {
            font-size: 3.5rem;
            line-height: 1.5;
            color: #f3f4f6;
            overflow-y: auto;
            flex-grow: 1;
            white-space: pre-wrap;
            padding-right: 15px;
        }

        .urdu-box {
            flex: 1;
            background-color: #111827;
            border-radius: 15px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            border: 1px solid #374151;
        }

        #urdu-output {
            font-size: 2.2rem;
            line-height: 1.6;
            color: #a7f3d0;
            direction: rtl;
            font-family: 'Noori Nastaliq', 'Urdu Typesetting', sans-serif;
            overflow-y: auto;
            flex-grow: 1;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            right: 50px;
            display: flex;
            gap: 15px;
            background: rgba(17, 24, 39, 0.85);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }

        button {
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-start { background-color: #10b981; color: white; }
        .btn-start:hover { background-color: #059669; }
        .btn-clear { background-color: #4b5563; color: white; }
        .btn-clear:hover { background-color: #374151; }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 5px; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Mosque Live Translation (Urdu ➔ English)</h1>
        <div id="status" class="status-badge">● Offline</div>
    </header>

    <div class="container">
        <!-- English Screen -->
        <div class="translation-box">
            <div class="box-title">English Translation</div>
            <div id="english-output">Translation will appear here in real-time...</div>
        </div>

        <!-- Urdu Screen -->
        <div class="urdu-box">
            <div class="box-title" style="text-align: right;">اُردو سکرپٹ</div>
            <div id="urdu-output">Imam's speech will show here...</div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button class="btn-start" id="start-btn" onclick="toggleListening()">Start Listening</button>
        <button class="btn-clear" onclick="clearText()">Clear Screen</button>
    </div>

    <script>
        let recognition;
        let isListening = false;
        let silenceTimer;
        
        // Master Storage Variables
        let lockedUrdu = "";      // Urdu text already sent for translation
        let lockedEnglish = "";   // Completed English translations
        let currentDraftUrdu = ""; // The text the Imam is currently speaking
        
        const startBtn = document.getElementById('start-btn');
        const statusBadge = document.getElementById('status');
        const urduOutput = document.getElementById('urdu-output');
        const englishOutput = document.getElementById('english-output');

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            
            // Continuous MUST be true to allow natural speaking rhythms
            recognition.continuous = true; 
            recognition.interimResults = true; 
            recognition.lang = 'ur-PK'; 

            recognition.onstart = () => {
                isListening = true;
                startBtn.innerText = "Stop Listening";
                startBtn.style.backgroundColor = "#ef4444";
                statusBadge.innerText = "● LIVE TRANSLATION ACTIVE";
                statusBadge.classList.add('active');
            };

            recognition.onend = () => {
                // If the system was forced to stop to clear the buffer, instantly reboot it
                if (isListening) {
                    setTimeout(() => {
                        if (isListening) {
                            try { recognition.start(); } catch(e) { console.error("Mic cycle error", e); }
                        }
                    }, 50);
                } else {
                    resetUI();
                }
            };

            recognition.onresult = (event) => {
                currentDraftUrdu = "";
                let newlyFinalized = "";

                // Parse Chrome's active text buffer
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    let chunk = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        newlyFinalized += chunk + " ";
                    } else {
                        currentDraftUrdu += chunk;
                    }
                }

                // SCENARIO 1: If Chrome behaves well and naturally finalizes a sentence
                if (newlyFinalized.trim().length > 0) {
                    lockedUrdu += newlyFinalized + " ";
                    translateText(newlyFinalized.trim());
                }

                // Update the Urdu screen (White for locked, Gray for draft)
                urduOutput.innerHTML = `<span style="color: #ffffff;">${lockedUrdu}</span> <span style="color: #9ca3af;">${currentDraftUrdu}</span>`;
                autoScroll(urduOutput);

                // Clear the pause timer because the Imam is actively speaking
                clearTimeout(silenceTimer);

                // SCENARIO 2: If Chrome gets stuck holding draft text (The Urdu Bug)
                if (currentDraftUrdu.trim().length > 0) {
                    silenceTimer = setTimeout(() => {
                        let textToProcess = currentDraftUrdu.trim();
                        
                        // Move the draft text into the locked text pile
                        lockedUrdu += textToProcess + " ";
                        currentDraftUrdu = ""; 
                        
                        // Instantly update screen to show text turning white
                        urduOutput.innerHTML = `<span style="color: #ffffff;">${lockedUrdu}</span>`;
                        autoScroll(urduOutput);

                        // Send the full sentence for translation
                        translateText(textToProcess);

                        // CRITICAL: Force the mic to cycle. This dumps Chrome's frozen memory 
                        // so the next sentence doesn't overlap.
                        recognition.stop(); 
                        
                    }, 1200); // 1.2 Seconds of silence = Sentence Complete
                }
            };

            recognition.onerror = (event) => {
                console.error("Speech Recognition Error: ", event.error);
                if (event.error === 'not-allowed') {
                    alert("Please allow microphone access.");
                    isListening = false;
                    resetUI();
                }
            };

        } else {
            alert("Your browser does not support Speech Recognition. Please use Google Chrome.");
        }

        function toggleListening() {
            if (!isListening) {
                recognition.start();
            } else {
                isListening = false;
                recognition.stop();
                clearTimeout(silenceTimer);
                resetUI();
            }
        }

        function resetUI() {
            startBtn.innerText = "Start Listening";
            startBtn.style.backgroundColor = "#10b981";
            statusBadge.innerText = "● Offline";
            statusBadge.classList.remove('active');
        }

        async function translateText(text) {
            try {
                const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=ur|en`);
                const data = await response.json();
                
                if (data.responseData && data.responseData.translatedText) {
                    let translatedChunk = data.responseData.translatedText;
                    
                    // Remove placeholder on first translation
                    if (lockedEnglish.length === 0) {
                        englishOutput.innerText = "";
                    }

                    // Append the new translation block cleanly
                    lockedEnglish += translatedChunk + "\n\n";
                    englishOutput.innerText = lockedEnglish;
                    autoScroll(englishOutput);
                }
            } catch (error) {
                console.error("Translation Error: ", error);
            }
        }

        function clearText() {
            lockedUrdu = "";
            lockedEnglish = "";
            currentDraftUrdu = "";
            urduOutput.innerText = "Imam's speech will show here...";
            englishOutput.innerText = "Translation will appear here in real-time...";
        }

        function autoScroll(element) {
            element.scrollTop = element.scrollHeight;
        }
    </script>
</body>
</html>
