<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Mosque Voice Translator</title>

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

header {
  text-align: center;
  padding: 15px;
  font-size: 24px;
  background: #111;
}

.status {
  font-size: 14px;
  opacity: 0.7;
}

.screen {
  height: calc(100vh - 70px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 30px;
}

.urdu {
  font-size: 48px;
  color: #60a5fa;
  direction: rtl;
  min-height: 80px;
}

.english {
  font-size: 64px;
  font-weight: bold;
  margin-top: 20px;
  max-width: 95%;
}

button {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
}
</style>
</head>

<body>

<header>
🕌 Live Urdu → English Mosque Voice Translator
<div class="status" id="status">Click start and allow microphone</div>
</header>

<div class="screen">
  <div class="urdu" id="urdu">---</div>
  <div class="english" id="english">---</div>
</div>

<button onclick="startMic()">🎤 Start Microphone</button>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  alert("Your browser does not support Speech Recognition. Use Chrome.");
}

const recognition = new SpeechRecognition();

// IMPORTANT SETTINGS (this is what was missing before)
recognition.lang = "ur-PK";
recognition.continuous = true;
recognition.interimResults = true;

let finalText = "";
let lastProcessed = "";

async function translate(text) {
  try {
    const res = await fetch("https://libretranslate.de/translate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        q: text,
        source: "ur",
        target: "en",
        format: "text"
      })
    });

    const data = await res.json();
    return data.translatedText;
  } catch (e) {
    return "Translation error";
  }
}

// LIVE SPEECH STREAM
recognition.onresult = async (event) => {
  let interim = "";

  for (let i = event.resultIndex; i < event.results.length; i++) {
    const transcript = event.results[i][0].transcript;

    if (event.results[i].isFinal) {
      finalText += transcript + " ";
    } else {
      interim += transcript;
    }
  }

  const fullText = finalText + interim;

  document.getElementById("urdu").innerText = fullText;

  // avoid spam translations
  if (finalText !== lastProcessed && finalText.trim().length > 0) {
    lastProcessed = finalText;

    document.getElementById("status").innerText = "Translating...";

    const translated = await translate(finalText);

    document.getElementById("english").innerText = translated;

    document.getElementById("status").innerText = "Live";
  }
};

// IMPORTANT: auto restart mic (this was missing before)
recognition.onend = () => {
  recognition.start();
};

recognition.onerror = (e) => {
  document.getElementById("status").innerText = "Mic error - restarting...";
  setTimeout(() => recognition.start(), 1000);
};

function startMic() {
  recognition.start();
  document.getElementById("status").innerText = "Listening... 🎤";
}
</script>

</body>
</html>
