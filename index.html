<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosque Real-Time Speech Translator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            cursor: pointer;
        }

        header {
            background-color: #111827;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #10b981;
        }

        h1 {
            font-size: 2.5rem;
            color: #10b981;
            font-weight: 600;
        }

        .status-badge {
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #ef4444;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .status-badge.active {
            background-color: #10b981;
            animation: pulse 2s infinite;
        }

        .container {
            display: flex;
            flex: 1;
            padding: 30px;
            height: calc(100vh - 100px);
        }

        .translation-box {
            flex: 1;
            background-color: #1f2937;
            border-radius: 15px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .box-title {
            font-size: 1.5rem;
            color: #9ca3af;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #374151;
            padding-bottom: 15px;
        }

        #english-output {
            font-size: 2.5rem; 
            line-height: 1.6;
            color: #f3f4f6;
            overflow-y: auto;
            flex-grow: 1;
            white-space: pre-wrap;
            padding-right: 20px;
            text-align: left; 
        }

        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 6px; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Live English Translation</h1>
        <div id="status" class="status-badge">● Click Screen to Start</div>
    </header>

    <div class="container">
        <div class="translation-box">
            <div class="box-title">Khutba Translation</div>
            <div id="english-output">Click anywhere on the screen to activate the microphone...</div>
        </div>
    </div>

    <script>
        let recognition;
        let isListening = false;
        let silenceTimer;
        
        let lockedEnglish = "";   
        let lastProcessedText = ""; // Deduplication guard variable
        
        const statusBadge = document.getElementById('status');
        const englishOutput = document.getElementById('english-output');

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            
            recognition.continuous = true; 
            recognition.interimResults = true; 
            recognition.lang = 'ur-PK'; 

            recognition.onstart = () => {
                isListening = true;
                statusBadge.innerText = "● LIVE TRANSLATION ACTIVE";
                statusBadge.classList.add('active');
                
                if (englishOutput.innerText.includes("Click anywhere")) {
                    englishOutput.innerText = "Listening to the Imam...\nTranslation will appear here shortly.";
                }
            };

            recognition.onend = () => {
                // If the app purposefully forced a mic cycle to dispatch text, turn it back on instantly
                if (isListening) {
                    try { 
                        recognition.start(); 
                    } catch(e) { 
                        setTimeout(() => { if(isListening) recognition.start(); }, 10);
                    }
                } else {
                    statusBadge.innerText = "● Offline";
                    statusBadge.classList.remove('active');
                }
            };

            recognition.onresult = (event) => {
                let completeSegment = "";

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    completeSegment += event.results[i][0].transcript;
                }

                clearTimeout(silenceTimer);

                if (completeSegment.trim().length > 0) {
                    // Fast 800ms dispatch
                    silenceTimer = setTimeout(() => {
                        let textToProcess = completeSegment.trim();
                        
                        // Deduplication check: Has this string chunk already gone out?
                        if (textToProcess !== lastProcessedText) {
                            lastProcessedText = textToProcess; 
                            translateText(textToProcess);
                            
                            // Hard-stop microphone immediately to safely clear Chrome's internal voice cache
                            recognition.stop(); 
                        }
                    }, 800); 
                }
            };

            recognition.onerror = (event) => {
                console.error("Speech Recognition Error: ", event.error);
                if (event.error === 'not-allowed') {
                    alert("Please allow microphone access in Chrome settings.");
                    isListening = false;
                    statusBadge.innerText = "● Access Denied";
                    statusBadge.classList.remove('active');
                }
            };

        } else {
            alert("Your browser does not support Speech Recognition. Please use Google Chrome.");
        }

        document.body.addEventListener('click', () => {
            if (!isListening && recognition) {
                recognition.start();
            }
        });

        async function translateText(text) {
            if (!text || text.trim().length === 0) return;

            try {
                const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=ur|en`);
                const data = await response.json();
                
                if (data.responseData && data.responseData.translatedText) {
                    let translatedChunk = data.responseData.translatedText.trim();
                    
                    // Filter raw echoes or pure transcription leaks
                    if (translatedChunk.toLowerCase() === text.toLowerCase()) {
                        return; 
                    }

                    if (englishOutput.innerText.includes("Listening to the Imam")) {
                        englishOutput.innerText = "";
                        lockedEnglish = "";
                    }

                    // Append translation cleanly
                    lockedEnglish += translatedChunk + " "; 
                    englishOutput.innerText = lockedEnglish;
                    autoScroll(englishOutput);
                }
            } catch (error) {
                console.error("Translation Error: ", error);
            }
        }

        function autoScroll(element) {
            element.scrollTop = element.scrollHeight;
        }
    </script>
</body>
</html>
