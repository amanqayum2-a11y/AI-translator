<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosque Real-Time Speech Translator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: #111827;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #10b981; /* Islamic Green accent */
        }

        h1 {
            font-size: 2.5rem;
            color: #10b981;
            font-weight: 600;
        }

        .status-badge {
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #ef4444;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge.active {
            background-color: #10b981;
            animation: pulse 2s infinite;
        }

        .container {
            display: flex;
            flex: 1;
            padding: 30px;
            gap: 30px;
            height: calc(100vh - 100px);
        }

        .translation-box {
            flex: 2;
            background-color: #1f2937;
            border-radius: 15px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .box-title {
            font-size: 1.5rem;
            color: #9ca3af;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #english-output {
            font-size: 3.5rem;
            line-height: 1.5;
            color: #f3f4f6;
            overflow-y: auto;
            flex-grow: 1;
            white-space: pre-wrap;
            padding-right: 15px;
        }

        .urdu-box {
            flex: 1;
            background-color: #111827;
            border-radius: 15px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            border: 1px solid #374151;
        }

        #urdu-output {
            font-size: 2.2rem;
            line-height: 1.6;
            color: #a7f3d0;
            direction: rtl;
            font-family: 'Noori Nastaliq', 'Urdu Typesetting', sans-serif;
            overflow-y: auto;
            flex-grow: 1;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            right: 50px;
            display: flex;
            gap: 15px;
            background: rgba(17, 24, 39, 0.85);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }

        button {
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-start { background-color: #10b981; color: white; }
        .btn-start:hover { background-color: #059669; }
        .btn-clear { background-color: #4b5563; color: white; }
        .btn-clear:hover { background-color: #374151; }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 5px; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Mosque Live Translation (Urdu ➔ English)</h1>
        <div id="status" class="status-badge">● Offline</div>
    </header>

    <div class="container">
        <!-- English Screen -->
        <div class="translation-box">
            <div class="box-title">English Translation</div>
            <div id="english-output">Translation will appear here in real-time...</div>
        </div>

        <!-- Urdu Screen -->
        <div class="urdu-box">
            <div class="box-title" style="text-align: right;">اُردو سکرپٹ</div>
            <div id="urdu-output">Imam's speech will show here...</div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button class="btn-start" id="start-btn" onclick="toggleListening()">Start Listening</button>
        <button class="btn-clear" onclick="clearText()">Clear Screen</button>
    </div>

    <script>
        let recognition;
        let isListening = false;
        
        // Sliding Window Trackers
        let totalWordsSentForTranslation = 0;
        let fallbackFlushTimer; 
        
        const startBtn = document.getElementById('start-btn');
        const statusBadge = document.getElementById('status');
        const urduOutput = document.getElementById('urdu-output');
        const englishOutput = document.getElementById('english-output');

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            
            recognition.continuous = true; 
            recognition.interimResults = true; 
            recognition.lang = 'ur-PK'; 

            recognition.onstart = () => {
                isListening = true;
                startBtn.innerText = "Stop Listening";
                startBtn.style.backgroundColor = "#ef4444";
                statusBadge.innerText = "● LIVE TRANSLATION ACTIVE";
                statusBadge.classList.add('active');
            };

            recognition.onend = () => {
                if (isListening) {
                    try { recognition.start(); } catch(e) { console.error(e); }
                } else {
                    resetUI();
                }
            };

            recognition.onresult = (event) => {
                let finalTranscript = '';
                let interimTranscript = '';

                // Gather all current words from the browser's audio buffer
                for (let i = 0; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + ' ';
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                // Show the running Urdu script immediately to the audience
                urduOutput.innerHTML = `<span style="color: #ffffff;">${finalTranscript}</span> <span style="color: #9ca3af;">${interimTranscript}</span>`;
                autoScroll(urduOutput);

                // Combine text and parse into clean word tokens
                let fullRunningText = (finalTranscript + " " + interimTranscript).trim();
                let allWords = fullRunningText.split(/\s+/).filter(Boolean);
                
                // SLIDING WINDOW PROCESSOR:
                // We leave a safety padding of 4 words at the very end because Chrome dynamically 
                // re-adjusts grammar for the most recent words. Everything before that is stable.
                let safetyBuffer = 4;
                if (allWords.length > totalWordsSentForTranslation + safetyBuffer) {
                    let stableWords = allWords.slice(totalWordsSentForTranslation, allWords.length - safetyBuffer);
                    let textToTranslate = stableWords.join(" ");

                    if (textToTranslate.trim().length > 0) {
                        translateText(textToTranslate);
                        totalWordsSentForTranslation += stableWords.length; // Lock them in
                    }
                }

                // SILENCE FALLBACK: If the Imam stops speaking entirely or pauses deeply, 
                // the safety buffer words would get stuck. This forces out remaining words after 1.2 seconds.
                clearTimeout(fallbackFlushTimer);
                fallbackFlushTimer = setTimeout(() => {
                    let currentRunningText = (finalTranscript + " " + interimTranscript).trim();
                    let currentWords = currentRunningText.split(/\s+/).filter(Boolean);
                    
                    if (currentWords.length > totalWordsSentForTranslation) {
                        let remainingWords = currentWords.slice(totalWordsSentForTranslation);
                        let textToTranslate = remainingWords.join(" ");
                        
                        if (textToTranslate.trim().length > 0) {
                            translateText(textToTranslate);
                            totalWordsSentForTranslation = currentWords.length;
                        }
                    }
                }, 1200);
            };

            recognition.onerror = (event) => {
                console.error("Speech Recognition Error: ", event.error);
                if (event.error === 'not-allowed') {
                    alert("Please allow microphone access.");
                    isListening = false;
                    resetUI();
                }
            };

        } else {
            alert("Your browser does not support Speech Recognition. Please use Google Chrome.");
        }

        function toggleListening() {
            if (!isListening) {
                totalWordsSentForTranslation = 0; // Reset text stream baseline
                recognition.start();
            } else {
                isListening = false;
                recognition.stop();
                clearTimeout(fallbackFlushTimer);
                resetUI();
            }
        }

        function resetUI() {
            startBtn.innerText = "Start Listening";
            startBtn.style.backgroundColor = "#10b981";
            statusBadge.innerText = "● Offline";
            statusBadge.classList.remove('active');
        }

        async function translateText(text) {
            try {
                const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=ur|en`);
                const data = await response.json();
                
                if (data.responseData && data.responseData.translatedText) {
                    let translatedChunk = data.responseData.translatedText;
                    
                    // Clear placeholder warning on first pass
                    if (englishOutput.innerText.includes("Translation will appear here")) {
                        englishOutput.innerText = "";
                    }

                    // Append real contextual English sentences smoothly
                    englishOutput.innerText += translatedChunk + " ";
                    autoScroll(englishOutput);
                }
            } catch (error) {
                console.error("Translation Error: ", error);
            }
        }

        function clearText() {
            urduOutput.innerText = "Imam's speech will show here...";
            englishOutput.innerText = "Translation will appear here in real-time...";
            totalWordsSentForTranslation = 0;
        }

        function autoScroll(element) {
            element.scrollTop = element.scrollHeight;
        }
    </script>
</body>
</html>
